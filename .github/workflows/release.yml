name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v1.2.0)
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
      PUSH_REF_NAME: ${{ github.ref_name }}
      DISPATCH_TAG: ${{ inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$PUSH_REF_NAME"
          fi
          # Reject anything that isn't a conventional semver-ish tag.
          if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+){0,2}([-.][A-Za-z0-9.-]+)?$ ]]; then
            echo "Refusing unexpected tag value: $TAG"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Sync package.json version to tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Typecheck
        run: pnpm compile

      - name: Build Chrome zip
        run: pnpm zip

      - name: Build Firefox zip
        run: pnpm zip:firefox

      - name: Rename zips + emit Firefox .xpi
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cp ".output/aiub-portal-plus-${VERSION}-chrome.zip"  aiub-portal-plus-chrome.zip
          cp ".output/aiub-portal-plus-${VERSION}-firefox.zip" aiub-portal-plus-firefox.zip
          # Firefox consumes add-ons as .xpi files. A .xpi is structurally a
          # ZIP archive with a manifest.json at the root — byte-for-byte what
          # `wxt zip -b firefox` produces. Copying to a .xpi extension lets
          # users drag-drop install on Firefox Developer / Nightly builds
          # (with xpinstall.signatures.required = false) and makes the file
          # ready for AMO submission.
          cp ".output/aiub-portal-plus-${VERSION}-firefox.zip" aiub-portal-plus-firefox.xpi
          ls -la aiub-portal-plus-*

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AIUB Portal+ ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            aiub-portal-plus-chrome.zip
            aiub-portal-plus-firefox.zip
            aiub-portal-plus-firefox.xpi
